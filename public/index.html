    <script>
    // API Service for server communication
    window.api = {
        async loadProjects() {
            try {
                const response = await fetch('/api/projects');
                if (!response.ok) throw new Error('Failed to load projects');
                return await response.json();
            } catch (error) {
                console.error('Error loading projects:', error);
                return [];
            }
        },

        async saveProjects(projects) {
            try {
                const response = await fetch('/api/projects', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ projects })
                });
                
                if (!response.ok) throw new Error('Failed to save projects');
                return await response.json();
            } catch (error) {
                console.error('Error saving projects:', error);
                throw error;
            }
        },

        async importProjects(importData, mode) {
            try {
                const response = await fetch('/api/import', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        projects: importData.projects,
                        mode: mode
                    })
                });
                
                if (!response.ok) throw new Error('Failed to import projects');
                return await response.json();
            } catch (error) {
                console.error('Error importing projects:', error);
                throw error;
            }
        },

        async exportProjects() {
            try {
                const response = await fetch('/api/export');
                if (!response.ok) throw new Error('Failed to export projects');
                
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `construction_projects_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                return { success: true };
            } catch (error) {
                console.error('Error exporting projects:', error);
                throw error;
            }
        },

        async uploadFiles(files) {
            try {
                const formData = new FormData();
                Array.from(files).forEach(file => {
                    formData.append('files', file);
                });
                
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('Failed to upload files');
                return await response.json();
            } catch (error) {
                console.error('Error uploading files:', error);
                throw error;
            }
        }
    };
</script>

        const calculateCostBreakdown = (project, subAmount) => {
            const feePercentage = project?.feePercentage || 0;
            const bondPercentage = project?.bondPercentage || 0;
            const roundCurrency = (amount) => Math.round((amount || 0) * 100) / 100;
            const subcontractorTotal = roundCurrency(subAmount);

            if (project?.isOfcc) {
                const bondAmount = roundCurrency(subcontractorTotal * (bondPercentage / 100));
                const subtotal = roundCurrency(subcontractorTotal + bondAmount);
                const feeAmount = roundCurrency(subtotal * (feePercentage / 100));
                const totalAmount = roundCurrency(subtotal + feeAmount);
                return {
                    feeAmount,
                    bondAmount,
                    subtotal,
                    totalAmount
                };
            }

            const feeAmount = roundCurrency(subcontractorTotal * (feePercentage / 100));
            const subtotal = roundCurrency(subcontractorTotal + feeAmount);
            const bondAmount = roundCurrency(subtotal * (bondPercentage / 100));
            const totalAmount = roundCurrency(subtotal + bondAmount);
            return {
                feeAmount,
                bondAmount,
                subtotal,
                totalAmount
            };
        };

        const ConstructionCostTracker = () => {
    const LAST_PROJECT_STORAGE_KEY = 'costTrackerLastProjectId';
    const [projects, setProjects] = useState([]);
    const [currentProject, setCurrentProject] = useState(null);
    const [activeTab, setActiveTab] = useState('subcontractor-costs');
    const [showNewProjectModal, setShowNewProjectModal] = useState(false);
    const [showSettingsModal, setShowSettingsModal] = useState(false);
    const [showImportModal, setShowImportModal] = useState(false);
    const [isLoading, setIsLoading] = useState(true);
    const [isSaving, setIsSaving] = useState(false);

    // Load projects from server on mount
    useEffect(() => {
        loadProjects();
    }, []);

    const loadProjects = async () => {
        setIsLoading(true);
        try {
            const serverProjects = await window.api.loadProjects();

            const storedProjectId = parseInt(localStorage.getItem(LAST_PROJECT_STORAGE_KEY), 10);
            const preferredProject = serverProjects.find(project => project.id === storedProjectId);
            const fallbackProject = serverProjects[0] || null;

            setProjects(serverProjects);
            setCurrentProject(preferredProject || fallbackProject);

            if (!preferredProject && fallbackProject) {
                localStorage.setItem(LAST_PROJECT_STORAGE_KEY, fallbackProject.id.toString());
            }

            if (serverProjects.length === 0) {
                localStorage.removeItem(LAST_PROJECT_STORAGE_KEY);
            }
        } catch (error) {
            console.error('Failed to load projects:', error);
            alert('Failed to load projects from server. Please check your connection.');
        } finally {
            setIsLoading(false);
        }
    };

    const saveProjectsToServer = async (projectsToSave) => {
        setIsSaving(true);
        try {
            await window.api.saveProjects(projectsToSave);
        } catch (error) {
            console.error('Failed to save projects:', error);
            alert('Failed to save projects to server. Your changes may be lost.');
        } finally {
            setIsSaving(false);
        }
    };

    const updateProject = (updatedProject) => {
        const newProjects = projects.map(p => p.id === updatedProject.id ? updatedProject : p);
        setProjects(newProjects);
        setCurrentProject(updatedProject);
        localStorage.setItem(LAST_PROJECT_STORAGE_KEY, updatedProject.id.toString());
        
        // Auto-save to server
        saveProjectsToServer(newProjects);
    };

    const addNewProject = (name) => {
        const newProject = {
            id: Date.now(),
            name,
            subcontractors: [],
            bondPercentage: 1.5,
            feePercentage: 10,
            isOfcc: false,
            subcontractorCosts: [],
            ownerChangeOrders: [],
            allowances: [],
            allowanceConsumptions: [],
            cmrBudget: 0,
            cmrConsumptions: [],
            subcontractorCostNotes: [],
            changeOrderNotes: [],
            allowanceNotes: [],
            allowanceConsumptionNotes: [],
            cmrConsumptionNotes: [],
            changeOrderStatusHistory: []
        };
        const newProjects = [...projects, newProject];
        setProjects(newProjects);
        setCurrentProject(newProject);
        localStorage.setItem(LAST_PROJECT_STORAGE_KEY, newProject.id.toString());
        setShowNewProjectModal(false);
        
        // Auto-save to server
        saveProjectsToServer(newProjects);
    };

    const exportToJSON = async () => {

    const exportToExcel = () => {
        if (!currentProject) return;
        
        // Create a new workbook
        const wb = XLSX.utils.book_new();
        
        // Helper function to format currency
        const formatCurrency = (amount) => {
            return amount ? `$${amount.toLocaleString()}` : '$0';
        };
        
        // Helper function to get notes for an item
        const getNotesText = (itemId, notesArray) => {
            const notes = (notesArray || []).filter(note => note.itemId === itemId);
            return notes.map(note => `${new Date(note.timestamp).toLocaleDateString()}: ${note.content}`).join('\n');
        };
        
        // 1. SUBCONTRACTOR COSTS SHEET
        const subCostsData = [
            // Header row
            ['Submitted CO #', 'Contract Change #', 'Subcontractor', 'Description', 'Amount', 'Date Submitted', 'Date Added', 'Additional Work Ticket', 'Linked To', 'Notes']
        ];
        
        currentProject.subcontractorCosts.forEach(cost => {
            let linkedTo = 'Not linked';
            if (cost.linkedType && cost.linkedId) {
                switch (cost.linkedType) {
                    case 'change-order':
                        const co = currentProject.ownerChangeOrders.find(c => c.id === cost.linkedId);
                        linkedTo = co ? `CO ${co.number || co.itemNumber} - ${co.description}` : 'Unknown Change Order';
                        break;
                    case 'allowance':
                        const consumption = currentProject.allowanceConsumptions.find(c => c.id === cost.linkedId);
                        if (consumption) {
                            const allowance = currentProject.allowances.find(a => a.id === consumption.allowanceId);
                            linkedTo = `${consumption.number} - ${allowance?.name || 'Unknown Allowance'}`;
                        }
                        break;
                    case 'cmr':
                        const cmr = currentProject.cmrConsumptions.find(c => c.id === cost.linkedId);
                        linkedTo = cmr ? `CMR ${cmr.number} - ${cmr.description}` : 'Unknown CMR';
                        break;
                }
            }
            
            const notes = getNotesText(cost.id, currentProject.subcontractorCostNotes);
            
            subCostsData.push([
                cost.submittedCONumber || '',
                cost.contractChangeNumber || '',
                cost.subcontractor || '',
                cost.description || '',
                cost.amount || 0,
                cost.dateSubmitted || '',
                cost.dateAdded || '',
                cost.additionalWorkTicket || '',
                linkedTo,
                notes
            ]);
        });
        
        const subCostsSheet = XLSX.utils.aoa_to_sheet(subCostsData);
        
        // Set column widths for subcontractor costs
        subCostsSheet['!cols'] = [
            {wch: 15}, // Submitted CO #
            {wch: 18}, // Contract Change #
            {wch: 20}, // Subcontractor
            {wch: 40}, // Description
            {wch: 12}, // Amount
            {wch: 12}, // Date Submitted
            {wch: 12}, // Date Added
            {wch: 15}, // Additional Work Ticket
            {wch: 30}, // Linked To
            {wch: 50}  // Notes
        ];
        
        XLSX.utils.book_append_sheet(wb, subCostsSheet, "Subcontractor Costs");
        
        // 2. CHANGE ORDERS SHEET
        const changeOrdersData = [
            ['Item #', 'CO Number', 'Description', 'Status', 'Date Added', 'Sub Due Date', 'Our Due Date', 'Sub Amount', 'Fee Amount', 'Bond Amount', 'Total Amount', 'Notes', 'Linked Costs']
        ];
        
        currentProject.ownerChangeOrders.forEach(co => {
            const linkedCosts = currentProject.subcontractorCosts.filter(cost => 
                cost.linkedType === 'change-order' && cost.linkedId === co.id
            );
            
            const subAmount = linkedCosts.reduce((sum, cost) => sum + (cost.amount || 0), 0);
            const { feeAmount, bondAmount, totalAmount } = calculateCostBreakdown(currentProject, subAmount);
            
            const notes = getNotesText(co.id, currentProject.changeOrderNotes);
            
            const linkedCostsText = linkedCosts.map(cost => 
                `${cost.submittedCONumber || cost.contractChangeNumber || 'No Number'} - ${cost.subcontractor} - ${formatCurrency(cost.amount)}`
            ).join('\n');
            
            const statusMap = {
                'pending': 'Pending',
                'awaiting-direction': 'Awaiting Direction',
                'submitted-ae': 'Submitted to A/E',
                'submitted-district': 'Submitted to District',
                'approved': 'Approved',
                'rejected': 'Rejected',
                'void': 'VOID'
            };
            
            changeOrdersData.push([
                co.itemNumber || '',
                co.number || 'TBD',
                co.description || '',
                statusMap[co.status] || co.status,
                co.dateAdded || '',
                co.subDueDate || '',
                co.ourDueDate || '',
                subAmount,
                feeAmount,
                bondAmount,
                totalAmount,
                notes,
                linkedCostsText
            ]);
        });
        
        const changeOrdersSheet = XLSX.utils.aoa_to_sheet(changeOrdersData);
        
        changeOrdersSheet['!cols'] = [
            {wch: 8},  // Item #
            {wch: 12}, // CO Number
            {wch: 40}, // Description
            {wch: 18}, // Status
            {wch: 12}, // Date Added
            {wch: 12}, // Sub Due Date
            {wch: 12}, // Our Due Date
            {wch: 12}, // Sub Amount
            {wch: 12}, // Fee Amount
            {wch: 12}, // Bond Amount
            {wch: 12}, // Total Amount
            {wch: 50}, // Notes
            {wch: 40}  // Linked Costs
        ];
        
        XLSX.utils.book_append_sheet(wb, changeOrdersSheet, "Change Orders");
        
        // 3. ALLOWANCES SHEET
        const allowancesData = [
            ['Type', 'Item', 'Description', 'Budget/Number', 'Amount Spent/Total', 'Remaining', 'Notes', 'Linked Costs']
        ];
        
        // Add allowance budgets
        currentProject.allowances.forEach(allowance => {
            const spent = currentProject.allowanceConsumptions
                .filter(c => c.allowanceId === allowance.id)
                .reduce((sum, consumption) => {
                    const linkedCosts = currentProject.subcontractorCosts.filter(cost => 
                        cost.linkedType === 'allowance' && cost.linkedId === consumption.id
                    );
                    return sum + linkedCosts.reduce((costSum, cost) => costSum + (cost.amount || 0), 0);
                }, 0);
            
            const remaining = allowance.budget - spent;
            const notes = getNotesText(allowance.id, currentProject.allowanceNotes);
            
            allowancesData.push([
                'Budget',
                allowance.name,
                'Allowance Budget',
                allowance.budget,
                spent,
                remaining,
                notes,
                ''
            ]);
        });
        
        // Add allowance consumptions
        currentProject.allowanceConsumptions.forEach(consumption => {
            const allowance = currentProject.allowances.find(a => a.id === consumption.allowanceId);
            const linkedCosts = currentProject.subcontractorCosts.filter(cost => 
                cost.linkedType === 'allowance' && cost.linkedId === consumption.id
            );
            
            const total = linkedCosts.reduce((sum, cost) => sum + (cost.amount || 0), 0);
            const notes = getNotesText(consumption.id, currentProject.allowanceConsumptionNotes);
            
            const linkedCostsText = linkedCosts.map(cost => 
                `${cost.submittedCONumber || cost.contractChangeNumber || 'No Number'} - ${cost.subcontractor} - ${formatCurrency(cost.amount)}`
            ).join('\n');
            
            allowancesData.push([
                'Consumption',
                allowance?.name || 'Unknown',
                consumption.description,
                consumption.number,
                total,
                '',
                notes,
                linkedCostsText
            ]);
        });
        
        const allowancesSheet = XLSX.utils.aoa_to_sheet(allowancesData);
        
        allowancesSheet['!cols'] = [
            {wch: 12}, // Type
            {wch: 25}, // Item
            {wch: 40}, // Description
            {wch: 15}, // Budget/Number
            {wch: 15}, // Amount Spent/Total
            {wch: 12}, // Remaining
            {wch: 50}, // Notes
            {wch: 40}  // Linked Costs
        ];
        
        XLSX.utils.book_append_sheet(wb, allowancesSheet, "Allowances");
        
        // 4. CMR CONTINGENCY SHEET
        const cmrData = [
            ['Type', 'Number', 'Description', 'Amount', 'Notes', 'Linked Costs']
        ];
        
        // Add budget summary
        const totalCMRSpent = currentProject.cmrConsumptions.reduce((sum, consumption) => {
            const linkedCosts = currentProject.subcontractorCosts.filter(cost => 
                cost.linkedType === 'cmr' && cost.linkedId === consumption.id
            );
            return sum + linkedCosts.reduce((costSum, cost) => costSum + (cost.amount || 0), 0);
        }, 0);
        
        cmrData.push([
            'Budget',
            'Total Budget',
            'CMR Contingency Budget',
            currentProject.cmrBudget,
            '',
            ''
        ]);
        
        cmrData.push([
            'Summary',
            'Total Spent',
            'Total amount consumed from contingency',
            totalCMRSpent,
            '',
            ''
        ]);
        
        cmrData.push([
            'Summary',
            'Remaining',
            'Remaining contingency budget',
            currentProject.cmrBudget - totalCMRSpent,
            '',
            ''
        ]);
        
        // Add empty row
        cmrData.push(['', '', '', '', '', '']);
        
        // Add consumptions
        currentProject.cmrConsumptions.forEach(consumption => {
            const linkedCosts = currentProject.subcontractorCosts.filter(cost => 
                cost.linkedType === 'cmr' && cost.linkedId === consumption.id
            );
            
            const total = linkedCosts.reduce((sum, cost) => sum + (cost.amount || 0), 0);
            const notes = getNotesText(consumption.id, currentProject.cmrConsumptionNotes);
            
            const linkedCostsText = linkedCosts.map(cost => 
                `${cost.submittedCONumber || cost.contractChangeNumber || 'No Number'} - ${cost.subcontractor} - ${formatCurrency(cost.amount)}`
            ).join('\n');
            
            cmrData.push([
                'Consumption',
                consumption.number,
                consumption.description,
                total,
                notes,
                linkedCostsText
            ]);
        });
        
        const cmrSheet = XLSX.utils.aoa_to_sheet(cmrData);
        
        cmrSheet['!cols'] = [
            {wch: 12}, // Type
            {wch: 15}, // Number
            {wch: 40}, // Description
            {wch: 15}, // Amount
            {wch: 50}, // Notes
            {wch: 40}  // Linked Costs
        ];
        
        XLSX.utils.book_append_sheet(wb, cmrSheet, "CMR Contingency");
        
        // 5. PROJECT SUMMARY SHEET
        const summaryData = [
            ['Project Information'],
            ['Project Name', currentProject.name],
            ['Export Date', new Date().toLocaleDateString()],
            [''],
            ['Project Settings'],
            ['Bond Percentage', `${currentProject.bondPercentage}%`],
            ['Fee Percentage', `${currentProject.feePercentage}%`],
            ['Project Type', currentProject.isOfcc ? 'OFCC' : 'Non-OFCC'],
            [''],
            ['Subcontractors'],
            ...currentProject.subcontractors.map(sub => ['', sub]),
            [''],
            ['Summary Totals'],
            ['Total Subcontractor Costs', currentProject.subcontractorCosts.reduce((sum, cost) => sum + (cost.amount || 0), 0)],
            ['Total Change Order Value', currentProject.ownerChangeOrders.reduce((sum, co) => {
                const linkedCosts = currentProject.subcontractorCosts.filter(cost => 
                    cost.linkedType === 'change-order' && cost.linkedId === co.id
                );
                const subAmount = linkedCosts.reduce((costSum, cost) => costSum + (cost.amount || 0), 0);
                return sum + calculateCostBreakdown(currentProject, subAmount).totalAmount;
            }, 0)],
            ['Total Allowances Budget', currentProject.allowances.reduce((sum, allowance) => sum + allowance.budget, 0)],
            ['Total Allowances Spent', currentProject.allowanceConsumptions.reduce((sum, consumption) => {
                const linkedCosts = currentProject.subcontractorCosts.filter(cost => 
                    cost.linkedType === 'allowance' && cost.linkedId === consumption.id
                );
                return sum + linkedCosts.reduce((costSum, cost) => costSum + (cost.amount || 0), 0);
            }, 0)],
            ['CMR Budget', currentProject.cmrBudget],
            ['CMR Spent', totalCMRSpent]
        ];
        
        const summarySheet = XLSX.utils.aoa_to_sheet(summaryData);
        
        summarySheet['!cols'] = [
            {wch: 25}, // Labels
            {wch: 30}  // Values
        ];
        
        XLSX.utils.book_append_sheet(wb, summarySheet, "Project Summary");
        
        // Generate and download the file
        const fileName = `${currentProject.name.replace(/[^a-z0-9]/gi, '_')}_export_${new Date().toISOString().split('T')[0]}.xlsx`;
        XLSX.writeFile(wb, fileName);
    };
    
    const validateImportData = (data) => {
        try {
            if (!data.projects || !Array.isArray(data.projects)) {
                throw new Error("Invalid format: 'projects' array not found");
            }
            
            // Check each project has required fields
            data.projects.forEach((project, index) => {
                if (!project.id || !project.name) {
                    throw new Error(`Project ${index + 1} missing required fields (id, name)`);
                }
                
                // Ensure all required arrays exist
                const requiredArrays = [
                    'subcontractors', 'subcontractorCosts', 'ownerChangeOrders', 
                    'allowances', 'allowanceConsumptions', 'cmrConsumptions'
                ];
                
                requiredArrays.forEach(arrayName => {
                    if (!Array.isArray(project[arrayName])) {
                        project[arrayName] = [];
                    }
                });
                
                // Ensure note arrays exist
                const noteArrays = [
                    'subcontractorCostNotes', 'changeOrderNotes', 'allowanceNotes',
                    'allowanceConsumptionNotes', 'cmrConsumptionNotes'
                ];
                
                noteArrays.forEach(arrayName => {
                    if (!Array.isArray(project[arrayName])) {
                        project[arrayName] = [];
                    }
                });
                
                // Ensure numeric fields exist
                if (typeof project.bondPercentage !== 'number') project.bondPercentage = 1.5;
                if (typeof project.feePercentage !== 'number') project.feePercentage = 10;
                if (typeof project.isOfcc !== 'boolean') project.isOfcc = false;
                if (typeof project.cmrBudget !== 'number') project.cmrBudget = 0;
            });
            
            return { valid: true, data };
        } catch (error) {
            return { valid: false, error: error.message };
        }
    };

    const handleImport = async (file, replaceMode) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const importData = JSON.parse(e.target.result);
                const validation = validateImportData(importData);
                
                if (!validation.valid) {
                    alert(`Import failed: ${validation.error}`);
                    return;
                }
                
                const mode = replaceMode ? 'replace' : 'merge';
                const result = await window.api.importProjects(validation.data, mode);
                
                if (result.success) {
                    alert(result.message);
                    // Reload projects from server
                    await loadProjects();
                } else {
                    alert('Import failed: ' + (result.error || 'Unknown error'));
                }
                
                setShowImportModal(false);
            } catch (error) {
                alert(`Import failed: Invalid JSON file - ${error.message}`);
            }
        };
        reader.readAsText(file);
    };

const SubcontractorCostsTab = ({ project, updateProject }) => {

    const getNextSubcontractorNumber = (subcontractor) => {
        const subCosts = project.subcontractorCosts.filter(cost => cost.subcontractor === subcontractor);
        const numbers = subCosts
            .map(cost => parseInt(cost.submittedCONumber))

    };

const addSubcontractorCost = (cost) => {
    const newCost = {
        ...cost,
        id: cost.id || Date.now(), // Use the ID from the form (temp ID) or generate new one
        dateAdded: new Date().toISOString().split('T')[0]
    };
    updateProject({
        ...project,
        subcontractorCosts: [...project.subcontractorCosts, newCost]
    });
    setShowForm(false);
};

    const updateSubcontractorCost = (updatedCost) => {
        updateProject({
            ...project,
            subcontractorCosts: project.subcontractorCosts.map(cost => 
                cost.id === updatedCost.id ? updatedCost : cost
            )
        });
        setEditingCost(null);
    };

    const startInlineEdit = (cost) => {
        setInlineEditingId(cost.id);
        setInlineEditData({...cost});
    };

    const saveInlineEdit = () => {
        updateProject({
            ...project,
            subcontractorCosts: project.subcontractorCosts.map(cost => 
                cost.id === inlineEditingId ? {
                    ...inlineEditData,
                    amount: inlineEditData.amount ? parseFloat(inlineEditData.amount) : null
                } : cost
            )
        });
        setInlineEditingId(null);
        setInlineEditData({});
    };

    const cancelInlineEdit = () => {
        setInlineEditingId(null);
        setInlineEditData({});
    };

    const deleteSubcontractorCost = (id) => {
        updateProject({
            ...project,
            subcontractorCosts: project.subcontractorCosts.filter(cost => cost.id !== id)
        });
    };

    const getLinkableItems = () => {
        const items = [];
        project.ownerChangeOrders.forEach(co => {
            items.push({
                type: 'change-order',
                id: co.id,
                label: `CO ${co.number} - ${co.description}`,
                status: co.status || ''
            });
        });
        project.allowanceConsumptions.forEach(consumption => {
            items.push({ 
                type: 'allowance', 
                id: consumption.id, 
                label: `${consumption.number} - ${consumption.description}`,
                status: 'Recorded'
            });
        });
        project.cmrConsumptions.forEach(consumption => {
            items.push({
                type: 'cmr',
                id: consumption.id,
                label: `CMR ${consumption.number} - ${consumption.description}`,
                status: 'Recorded'
            });
        });
        return items;
    };

    const getLinkedStatusLabel = (status) => {
        const statusMap = {
            'pending': 'Pending',
            'awaiting-direction': 'Awaiting Direction',
            'submitted-ae': 'Submitted to A/E',
            'submitted-district': 'Submitted to District',
            'approved': 'Approved',
            'rejected': 'Rejected',
            'void': 'VOID'
        };

        return statusMap[status] || status || '-';
    };

    const getFilteredAndSortedCosts = () => {
        let filtered = project.subcontractorCosts.filter(cost => {
            if (filters.subcontractor && !cost.subcontractor?.toLowerCase().includes(filters.subcontractor.toLowerCase())) return false;
            if (filters.description && !cost.description?.toLowerCase().includes(filters.description.toLowerCase())) return false;
            if (filters.linkedType && cost.linkedType !== filters.linkedType) return false;
            if (filters.dateFrom && cost.dateSubmitted < filters.dateFrom) return false;
            if (filters.dateTo && cost.dateSubmitted > filters.dateTo) return false;
            return true;
        });

        if (sortField) {
            filtered.sort((a, b) => {
                let aVal = a[sortField];
                let bVal = b[sortField];
                
                // Handle null/undefined values
                if (aVal == null) aVal = '';
                if (bVal == null) bVal = '';
                
                if (sortField === 'amount') {
                    aVal = parseFloat(aVal) || 0;
                    bVal = parseFloat(bVal) || 0;
                } else if (typeof aVal === 'string') {
                    aVal = aVal.toLowerCase();
                    bVal = bVal.toLowerCase();
                }
                
                if (sortDirection === 'asc') {
                    return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;

        let costsWithSelectedFiles = linkedCosts;
        if (choice === 'pdf') {

    project,

    defaultDescription = ''
}) => {
    const [showAddCostForm, setShowAddCostForm] = useState(false);

    // Helper function to get user-friendly link description
    const getLinkDescription = (cost) => {
        if (!cost.linkedType || !cost.linkedId) return null;
        
        switch (cost.linkedType) {
            case 'change-order':
                const co = project.ownerChangeOrders.find(c => c.id === cost.linkedId);
                return co ? `CO ${co.number || co.itemNumber} - ${co.description?.substring(0, 30)}...` : 'Unknown Change Order';
            case 'allowance':
                const consumption = project.allowanceConsumptions.find(c => c.id === cost.linkedId);
                if (consumption) {
                    const allowance = project.allowances.find(a => a.id === consumption.allowanceId);
                    return `${consumption.number} - ${allowance?.name || 'Unknown Allowance'}`;
                }
                return 'Unknown Allowance';
            case 'cmr':
                const cmr = project.cmrConsumptions.find(c => c.id === cost.linkedId);
                return cmr ? `CMR ${cmr.number} - ${cmr.description?.substring(0, 30)}...` : 'Unknown CMR';
            default:
                return 'Unknown Link';
        }
    };

    // Get all subcontractor costs that could be linked
    const allCosts = project.subcontractorCosts.map(cost => ({
        ...cost,
        isLinked: cost.linkedType && cost.linkedId,
        linkDescription: getLinkDescription(cost)
    }));

    // Filter costs based on the toggle
    const availableCosts = showAllCosts ? 
        allCosts : 
        allCosts.filter(cost => !cost.isLinked || selectedCosts.has(cost.id));

    const unlinkedCount = allCosts.filter(cost => !cost.isLinked).length;
    const linkedCount = allCosts.filter(cost => cost.isLinked && !selectedCosts.has(cost.id)).length;

    const handleCostToggle = (costId) => {
        const newSelected = new Set(selectedCosts);
        if (newSelected.has(costId)) {
            newSelected.delete(costId);
        } else {
            newSelected.add(costId);
        }
        setSelectedCosts(newSelected);
        
        // Update the linked costs immediately
        const newLinkedCosts = allCosts.filter(cost => newSelected.has(cost.id));
        onCostsChange(newLinkedCosts);
    };

    const addNewCost = (costData) => {
        const newCost = {
            ...costData,
            id: Date.now(),
            dateAdded: new Date().toISOString().split('T')[0],
            amount: costData.amount ? parseFloat(costData.amount) : null
        };

        // Add to project's subcontractor costs (without linking yet - will be handled in form submission)
        const updatedProject = {
            ...project,
            subcontractorCosts: [...project.subcontractorCosts, newCost]

        updateProject(updatedProject);

        // Add to selected costs
        const newSelected = new Set(selectedCosts);
        newSelected.add(newCost.id);
        setSelectedCosts(newSelected);
        
        // Update linked costs
        const newLinkedCosts = [...linkedCosts, newCost];
        onCostsChange(newLinkedCosts);

            .filter(num => !isNaN(num));
        return numbers.length > 0 ? Math.max(...numbers) + 1 : 1;

        files: cost?.files || [],
        ...cost
    });

    const [uploadedFiles, setUploadedFiles] = useState(cost?.files || []);
    const [isUploading, setIsUploading] = useState(false);
    const [uploadProgress, setUploadProgress] = useState(0);
    const [tempCostId] = useState(cost?.id || `temp_${Date.now()}`);

    // Auto-update submitted CO number when subcontractor changes
    React.useEffect(() => {
        if (formData.subcontractor && !cost && !formData.submittedCONumber) {
            const nextNumber = getNextNumber(formData.subcontractor);
            setFormData(prev => ({...prev, submittedCONumber: nextNumber.toString()}));
        }
    }, [formData.subcontractor, cost, getNextNumber]);

    // Load existing files when editing
    React.useEffect(() => {
        if (cost && cost.id && formData.subcontractor) {
            loadExistingFiles();
        }
    }, [cost]);

    const loadExistingFiles = async () => {
        try {
            const response = await fetch(`/api/cost-files/${encodeURIComponent(project.name)}/${encodeURIComponent(formData.subcontractor)}/${cost.id}`);
            if (response.ok) {
                const data = await response.json();
                setUploadedFiles(data.files || []);
            }
        } catch (error) {
            console.error('Error loading existing files:', error);
        }
    };

    const handleFileUpload = async (files) => {
        if (!files || files.length === 0) return;
        
        // Validate required fields before upload
        if (!formData.subcontractor) {
            alert('Please select a subcontractor before uploading files.');
            return;
        }
        if (!formData.description) {
            alert('Please enter a description before uploading files.');
            return;
        }
        
        setIsUploading(true);
        setUploadProgress(0);

        try {
            const formDataToUpload = new FormData();
            
            // Add all files
            Array.from(files).forEach(file => {
                formDataToUpload.append('files', file);
            });
            
            // Add metadata for organized storage - use current form data
            formDataToUpload.append('projectId', project.id.toString());
            formDataToUpload.append('projectName', project.name);
            formDataToUpload.append('subcontractor', formData.subcontractor);
            formDataToUpload.append('costId', tempCostId.toString());
            formDataToUpload.append('description', formData.description);

            const response = await fetch('/api/upload-cost-files', {
                method: 'POST',
                body: formDataToUpload
            });

            if (!response.ok) {
                throw new Error('Upload failed');
            }

            const result = await response.json();
            
            // Add new files to the list
            setUploadedFiles(prev => [...prev, ...result.files]);
            setUploadProgress(100);
            
            setTimeout(() => {
                setIsUploading(false);
                setUploadProgress(0);
            }, 1000);

        } catch (error) {
            console.error('Upload error:', error);
            alert('Failed to upload files: ' + error.message);
            setIsUploading(false);
            setUploadProgress(0);
        }
    };

    const handleDeleteFile = async (file) => {
        if (!confirm(`Are you sure you want to delete ${file.filename}?`)) return;

        try {
            const response = await fetch('/api/delete-file', {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    relativePath: file.relativePath
                })
            });

            if (response.ok) {
                setUploadedFiles(prev => prev.filter(f => f.filename !== file.filename));
            } else {

                    ),
                    React.createElement('div', null,
                        React.createElement('label', {className: "block text-sm font-medium text-gray-700"}, "Fee Percentage"),
                        React.createElement('input', {
                            type: "number",
                            step: "0.1",
                            value: settings.feePercentage,
                            onChange: (e) => setSettings({...settings, feePercentage: e.target.value}),
                            className: "mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md"
                        })
                    )
                ),

                React.createElement('div', null,
                    React.createElement('label', {className: "block text-sm font-medium text-gray-700"}, "Project Type"),
                    React.createElement('select', {
                        value: settings.isOfcc ? 'ofcc' : 'non-ofcc',
                        onChange: (e) => setSettings({...settings, isOfcc: e.target.value === 'ofcc'}),
                        className: "mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md"
                    },
                        React.createElement('option', {value: 'non-ofcc'}, 'Non-OFCC (Fee before Bond)'),
                        React.createElement('option', {value: 'ofcc'}, 'OFCC (Bond before Fee)')
                    ),
                    React.createElement('p', {className: "mt-1 text-xs text-gray-500"},
                        settings.isOfcc
                            ? 'OFCC projects calculate bond first, then apply fee to subtotal + bond.'
                            : 'Non-OFCC projects calculate fee first, then apply bond to subtotal + fee.'
                    )
                ),

                React.createElement('div', null,
                    React.createElement('label', {className: "block text-sm font-medium text-gray-700 mb-2"}, "Subcontractors"),
                    React.createElement('div', {className: "space-y-2"},
                        ...settings.subcontractors.map((sub, index) => 
                            React.createElement('div', {key: index, className: "flex justify-between items-center p-2 bg-gray-50 rounded"},
                                React.createElement('span', null, sub),
                                React.createElement('button', {
                                    type: "button",
                                    onClick: () => removeSubcontractor(index),
                                    className: "text-red-600 hover:text-red-900"
                                }, React.createElement(Trash2))
                            )
                        ),
                        React.createElement('div', {className: "flex space-x-2"},
                            React.createElement('input', {
                                type: "text",
                                value: settings.newSubcontractor,
                                onChange: (e) => setSettings({...settings, newSubcontractor: e.target.value}),
                                placeholder: "Add new subcontractor",
                                className: "flex-1 px-3 py-2 border border-gray-300 rounded-md"
                            }),
                            React.createElement('button', {
                                type: "button",
                                onClick: addSubcontractor,
                                className: "px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700"
                            }, "Add")
                        )
                    )
                ),

    React.createElement('div', null,
        React.createElement('label', {className: "block text-sm font-medium text-gray-700 mb-2"}, "Change Order Template"),
        React.createElement('div', {className: "mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md"},
            React.createElement('div', {className: "space-y-1 text-center"},
                React.createElement(Upload, {className: "mx-auto h-12 w-12 text-gray-400"}),
                React.createElement('div', {className: "flex text-sm text-gray-600"},
                    React.createElement('label', {
                        htmlFor: "template-upload",
                        className: "relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500"
                    },
                        React.createElement('span', null, "Upload Excel template"),
                        React.createElement('input', {
                            id: "template-upload",
                            name: "template-upload",
                            type: "file",
                            className: "sr-only",
                            accept: ".xlsx,.xls",
                            onChange: handleTemplateUpload,
                            disabled: isUploadingTemplate
                        })
                    )
                ),
                React.createElement('p', {className: "text-xs text-gray-500"}, "Excel template (.xlsx or .xls) with tagged fields"),
                settings.templatePath && React.createElement('p', {className: "text-xs text-green-600"}, "✓ Template uploaded"),
                isUploadingTemplate && React.createElement('p', {className: "text-xs text-blue-600"}, "Uploading...")
            )
        )
    ),

                React.createElement('div', {className: "flex justify-end space-x-3"},
                    React.createElement('button', {type: "button", onClick: onClose, className: "px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50"}, "Cancel"),
                    React.createElement('button', {type: "submit", className: "px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700"}, "Save Settings")
                )
            );
        };

        const Modal = ({ children, onClose, title }) => {
            return React.createElement('div', {className: "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"},
                React.createElement('div', {className: "bg-white rounded-lg max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto"},
                    React.createElement('div', {className: "flex justify-between items-center p-6 border-b"},
                        React.createElement('h3', {className: "text-lg font-medium text-gray-900"}, title),
                        React.createElement('button', {
                            onClick: onClose,
                            className: "text-gray-400 hover:text-gray-600"
                        }, "×")
                    ),
                    React.createElement('div', {className: "p-6"}, children)
                )
            );
        };

        const ImportModal = ({ onImport, onCancel }) => {
            const [selectedFile, setSelectedFile] = useState(null);
            const [importMode, setImportMode] = useState('merge');

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file && file.type === 'application/json') {
                    setSelectedFile(file);
                } else {
                    alert('Please select a valid JSON file');
                    e.target.value = '';
                }
            };

            const handleImport = () => {
                if (!selectedFile) {
                    alert('Please select a file first');
                    return;
                }
                
                const replaceMode = importMode === 'replace';
                onImport(selectedFile, replaceMode);
            };

            return React.createElement('div', {className: "space-y-4"},
                React.createElement('div', null,
                    React.createElement('label', {className: "block text-sm font-medium text-gray-700 mb-2"}, "Select JSON file to import"),
                    React.createElement('input', {
                        type: "file",
                        accept: ".json",
                        onChange: handleFileSelect,
                        className: "block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                    })
                ),

                React.createElement('div', null,
                    React.createElement('label', {className: "block text-sm font-medium text-gray-700 mb-2"}, "Import Mode"),
                    React.createElement('div', {className: "space-y-2"},
                        React.createElement('label', {className: "flex items-center"},
                            React.createElement('input', {
                                type: "radio",
                                name: "importMode",
                                value: "merge",
                                checked: importMode === 'merge',
                                onChange: (e) => setImportMode(e.target.value),
                                className: "mr-2"
                            }),
                            React.createElement('span', {className: "text-sm text-gray-700"}, "Merge with existing projects (recommended)")
                        ),
                        React.createElement('label', {className: "flex items-center"},
                            React.createElement('input', {
                                type: "radio",
                                name: "importMode",
                                value: "replace",
                                checked: importMode === 'replace',
                                onChange: (e) => setImportMode(e.target.value),
                                className: "mr-2"
                            }),
                            React.createElement('span', {className: "text-sm text-gray-700"}, "Replace all existing projects (⚠️ will delete current data)")
                        )
                    )
                ),

                selectedFile && React.createElement('div', {className: "p-3 bg-gray-50 rounded"},
                    React.createElement('p', {className: "text-sm text-gray-600"}, 
                        `Selected: ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(1)} KB)`
                    )
                ),

                React.createElement('div', {className: "flex justify-end space-x-3"},
                    React.createElement('button', {
                        type: "button",
                        onClick: onCancel,
                        className: "px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50"
                    }, "Cancel"),
                    React.createElement('button', {
                        type: "button",
                        onClick: handleImport,
                        disabled: !selectedFile,
                        className: `px-4 py-2 rounded-md text-white ${selectedFile ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-400 cursor-not-allowed'}`
                    }, "Import Projects")
                )
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(ConstructionCostTracker));
    </script>
</body>
</html>
